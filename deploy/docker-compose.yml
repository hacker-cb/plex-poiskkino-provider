# Run from the repo root:  docker compose -f deploy/docker-compose.yml up -d
# Put your token in a `.env` at the repo root (cp .env.example .env).
services:
  poiskkino-provider:
    image: ghcr.io/hacker-cb/plex-poiskkino-provider:latest
    # To build locally instead of pulling the published image, comment out
    # `image:` above and uncomment the two lines below:
    # build:
    #   context: ..
    container_name: poiskkino-provider
    restart: unless-stopped
    env_file:
      - ../.env
    # Bind to localhost only — the Plex provider API has no authentication yet,
    # so the service must not be reachable from outside the host.
    ports:
      - "127.0.0.1:8000:8000"
