name: Release Please

# On every push to master, Release Please maintains a release PR that bumps the
# version and updates the changelog from Conventional Commits. Merging that PR
# creates a vX.Y.Z tag + GitHub Release, and (in the same run) publishes the
# semver-tagged multi-arch image to GHCR.
#
# The image publish lives here (not in a tag-triggered workflow) because a tag
# created with the default GITHUB_TOKEN does not trigger other workflows.
on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          # PAT (not GITHUB_TOKEN) so the release PR triggers CI + Copilot and is
          # mergeable under the master ruleset's required checks.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # --- Publish the released image, only when a release was just cut ---
      - if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v7
      - if: ${{ steps.release.outputs.release_created }}
        uses: docker/setup-qemu-action@v4
      - if: ${{ steps.release.outputs.release_created }}
        uses: docker/setup-buildx-action@v4
      - if: ${{ steps.release.outputs.release_created }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - if: ${{ steps.release.outputs.release_created }}
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: latest=true
          tags: |
            type=raw,value=${{ steps.release.outputs.version }}
            type=raw,value=${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}
      - if: ${{ steps.release.outputs.release_created }}
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
